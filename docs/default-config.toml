# Forgectl Project Configuration
# Place this file at .forgectl/config in your project root.
# All values shown are defaults.

# --- Domains (optional) ---
# Declare known domains with names and paths.
# Domains are optional. When configured, spec queue entries at init
# must reference a configured domain name.
# No domain path may be a prefix of another domain path.
#
# [[domains]]
# name = "optimizer"
# path = "optimizer"
#
# [[domains]]
# name = "portal"
# path = "portal"

# --- Specifying Phase ---
# Controls spec generation from planning documents.

[specifying]
# Number of specs processed per cycle. Grouped by domain — a batch
# never mixes domains. If a domain has more specs than batch, it
# produces multiple batches before moving to the next domain.
batch = 3
# Commit staging strategy for specifying commits.
# "all-specs" stages all files found in domain specs/ directories.
commit_strategy = "all-specs"

[specifying.eval]
# Minimum eval rounds before PASS can accept a spec batch.
min_rounds = 1
# Maximum eval rounds. FAIL at this threshold forces acceptance.
max_rounds = 3
# Sub-agent type for spec batch evaluation.
agent_type = "opus"
# Number of sub-agents to spawn for evaluation.
agent_count = 1

[specifying.cross_reference]
# Minimum eval rounds for domain cross-reference.
min_rounds = 1
# Maximum eval rounds. FAIL at this threshold forces acceptance.
max_rounds = 2
# Sub-agent type for cross-referencing domain specs.
agent_type = "haiku"
# Number of sub-agents to spawn for cross-referencing.
agent_count = 3
# When true, pause for user review after first CROSS_REFERENCE_EVAL.
# Overrides user_guided — fires even when user_guided is false.
user_review = false

[specifying.cross_reference.eval]
# Sub-agent type for evaluating cross-reference work.
agent_type = "opus"
# Number of sub-agents to spawn for cross-reference evaluation.
agent_count = 1

[specifying.reconciliation]
# Minimum rounds before PASS can complete reconciliation.
# 0 means a single PASS completes immediately.
min_rounds = 0
# Maximum reconciliation rounds. FAIL at this threshold forces completion.
max_rounds = 3
# Sub-agent type for reconciliation evaluation.
agent_type = "opus"
# Number of sub-agents to spawn for reconciliation evaluation.
agent_count = 1
# When true, RECONCILE_REVIEW action includes "STOP please review and discuss
# with user before continuing." When false, it says "Reconciliation review complete."
# The state is entered either way — this only controls the output message.
user_review = false

# --- Planning Phase ---
# Controls implementation plan generation from specs.

[planning]
# Number of plans processed per cycle.
# Values > 1 are not yet supported. Reserved for future use.
batch = 1
# Commit staging strategy for planning commits.
# "strict" only stages files explicitly registered in state/plan.json.
commit_strategy = "strict"
# When true, SELF_REVIEW state is entered between validation and
# EVALUATE. The agent reviews their plan against specs and study
# notes before evaluation.
self_review = false

[planning.study_code]
# Sub-agent type for codebase exploration.
agent_type = "haiku"
# Number of sub-agents to spawn for codebase exploration.
agent_count = 3

[planning.eval]
# Minimum eval rounds before PASS can accept a plan.
min_rounds = 1
# Maximum eval rounds. FAIL at this threshold forces acceptance.
max_rounds = 3
# Sub-agent type for plan evaluation.
agent_type = "opus"
# Number of sub-agents to spawn for plan evaluation.
agent_count = 1

[planning.refine]
# Sub-agent type for updating plan from eval findings.
agent_type = "opus"
# Number of sub-agents to spawn for plan refinement.
agent_count = 1

# --- Implementing Phase ---
# Controls batched implementation of plan items.

[implementing]
# Maximum unblocked plan items per implementation batch.
# Items are selected in dependency order from the current layer.
batch = 2
# Commit staging strategy for implementing commits.
# "scoped" stages files registered in state plus any changes within the domain path.
commit_strategy = "scoped"

[implementing.eval]
# Minimum eval rounds before PASS can accept an implementation batch.
min_rounds = 1
# Maximum eval rounds. FAIL at this threshold forces acceptance.
max_rounds = 3
# Sub-agent type for implementation evaluation.
agent_type = "opus"
# Number of sub-agents to spawn for implementation evaluation.
agent_count = 1

# --- Paths ---
# Directory locations for scaffold state and domain artifacts.

[paths]
# Where session state files are stored.
# Absolute path: used directly.
# Relative path: resolved relative to project root.
state_dir = ".forgectl/state"

# Directory name for domain artifacts (plans, notes, manifests).
# Created inside each domain as <domain>/<workspace_dir>/
workspace_dir = ".forge_workspace"

# --- General ---
# Cross-cutting settings.

[general]
# When true, the scaffold pauses at SELECT (specifying), REVIEW (planning),
# and ORIENT (implementing) for user discussion. Can be toggled at runtime
# with --guided / --no-guided on any advance call.
user_guided = true

# Controls whether the scaffold requires and executes git commits.
# false: No git operations. --message is not required. Engineer commits manually.
# true:  --message is required at commit points. Scaffold stages and commits automatically.
#        See docs/auto-committing.md for commit points, staging strategies, and behavior.
enable_commits = false

# --- Logs ---
# Activity logging configuration.

[logs]
# Enable or disable activity logging.
enabled = true

# Delete log files older than N days.
# 0 = keep forever.
# Validated at init time: must be >= 0.
retention_days = 90

# Maximum log files to keep. Oldest deleted first.
# 0 = unlimited.
# Validated at init time: must be >= 0.
# Log files are stored in ~/.forgectl/logs/ (user home, not project directory).
max_files = 50
